<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCC SPIN & WIN CHALLENGE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body class="night-mode">
  <div class="game-bg" aria-hidden="true">
    <div class="stars"></div>
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="cloud cloud-a"></div>
    <div class="cloud cloud-b"></div>
    <div class="cloud cloud-c"></div>
    <div class="cloud cloud-d"></div>
    <div class="hill hill-yellow"></div>
    <div class="hill hill-blue"></div>
    <div class="hill hill-green"></div>
    <div class="hill hill-small"></div>
    <div class="bushes bushes-back"></div>
    <div class="bushes bushes-front"></div>
    <div class="flowers flowers-left"></div>
    <div class="flowers flowers-right"></div>
    <div class="ground"></div>
  </div>

  <main class="app">
    <header id="heroHeader" class="hero-header">
      <div class="scc-logo">SCC</div>
      <div class="title-wrap">
        <h1>SCC SPIN &amp; WIN</h1>
        <h2>CHALLENGE</h2>
        <p>Spin the Lucky Wheel and Win Exciting Prizes!</p>
      </div>
    </header>

    <section id="registrationScreen" class="registration-screen">
      <form id="registrationForm" class="register-card">
        <h3>REGISTER TO PARTICIPATE</h3>

        <label for="playerName">FULL NAME</label>
        <input id="playerName" name="playerName" type="text" placeholder="Enter full name" autocomplete="name" required />

        <label for="department">DEPARTMENT</label>
        <input id="department" name="department" type="text" placeholder="Enter department" required />

        <label for="phoneNumber">PHONE NUMBER</label>
        <input id="phoneNumber" name="phoneNumber" type="tel" placeholder="01X-XXXXXXX" autocomplete="tel" required />

        <label class="consent-row" for="consentCheck">
          <input id="consentCheck" type="checkbox" required />
          <span>I consent to the collection and use of my personal information, picture &amp; etc for event participation and agree that the organizer may contact me in the future regarding promotions, marketing campaigns, new products, services, and upcoming events.</span>
        </label>

        <button class="join-btn" type="submit">JOIN NOW</button>
      </form>
    </section>

    <section id="gameScreen" class="game-screen hidden">
      <div class="wheel-stage" id="wheelStage">
        <div class="pointer" id="pointer"></div>
        <div class="wheel-shell">
          <div class="led-layer"></div>
          <canvas id="wheelCanvas" width="1600" height="1600"></canvas>
          <button id="spinButton" class="spin-button">SPIN</button>
        </div>
      </div>
    </section>
  </main>

  <div id="winnerOverlay" class="winner-overlay hidden">
    <div class="winner-card">
      <div class="winner-badge">🎉</div>
      <h2>CONGRATULATIONS!</h2>
      <p id="winnerPlayer">You Won</p>
      <h3 id="winnerPrize">PRIZE</h3>
      <div class="winner-actions">
        <button id="closeWinner" class="awesome-btn">AWESOME!</button>
        <button id="retryWinner" class="retry-btn">RETRY</button>
      </div>
    </div>
  </div>

  <canvas id="fxCanvas"></canvas>
  <footer>© 2026 Sabah Credit Corporation • SCC SPIN &amp; WIN CHALLENGE</footer>
  <script src="script.js?v=7"></script>
</body>
</html>
