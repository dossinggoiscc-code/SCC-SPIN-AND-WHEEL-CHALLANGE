<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SCC SPIN & WIN CHALLENGE</title>
  <meta name="theme-color" content="#22a7f2" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="world" aria-hidden="true">
      <div class="sky day"></div><div class="sky night"></div><div class="stars"></div>
      <div class="sun"></div><div class="moon"></div>
      <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div>
      <div class="mountain m1"></div><div class="mountain m2"></div><div class="mountain m3"></div>
      <div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div>
      <div class="tree-line back"></div><div class="tree-line front"></div>
      <div class="bush-row"></div><div class="flower-bed"></div><div class="ground"></div>
    </section>

    <header class="top-brand">
      <img src="assets/images/sabahcredit-logo.png" alt="Sabah Credit Corporation logo" class="scc-logo" />
      <div class="brand-text">
        <h1>SCC SPIN &amp; WIN CHALLENGE</h1>
        <p>Spin the Lucky Wheel and Win Exciting Prizes!</p>
      </div>
    </header>

    <section id="registrationScreen" class="screen registration-screen">
      <form id="registerForm" class="register-card" autocomplete="off">
        <img src="assets/images/malia.png" class="form-mascot" alt="Malia mascot" />
        <h2>Register to Participate</h2>
        <label>Full Name (as per IC)
          <input id="playerName" type="text" placeholder="Enter full name" required />
        </label>
        <label>Organisation / Department
          <input id="organisation" type="text" placeholder="e.g. School / Hospital / Department" required />
        </label>
        <label>Mobile Number
          <input id="mobileNumber" type="tel" inputmode="tel" placeholder="e.g. 0198417064" required />
        </label>
        <label class="consent-box">
          <input id="consentCheck" type="checkbox" required />
          <span>I hereby consent to Sabah Credit Corporation collecting, processing, and using my personal data for the purpose of administering and managing my participation in the SCC SPIN &amp; WIN CHALLENGE. I further consent to the use of photographs, videos, and other recordings taken during the event for publicity, promotional, and marketing purposes. I also agree to receive future updates, promotional materials, marketing campaigns, products, services, and invitations to events organised by Sabah Credit Corporation.</span>
        </label>
        <button class="primary-btn" type="submit">START CHALLENGE</button>
      </form>
    </section>

    <section id="gameScreen" class="screen game-screen hidden">
      <div class="game-camera" id="gameCamera">
        <div class="wheel-wrap" id="wheelWrap">
          <div class="pointer" id="pointer"><span></span></div>
          <canvas id="wheelCanvas" width="1400" height="1400" aria-label="Lucky prize wheel"></canvas>
          <button id="spinButton" class="spin-btn" type="button"><span>SPIN</span></button>
        </div>
      </div>
    </section>

    <section class="mascot-layer" aria-hidden="true">
      <img src="assets/images/malio.webp" class="mascot malio" alt="" />
      <img src="assets/images/malia.png" class="mascot malia" alt="" />
      <img src="assets/images/bob.webp" class="mascot bob" alt="" />
      <img src="assets/images/ejau.webp" class="mascot ejau" alt="" />
      <img src="assets/images/kladee.webp" class="mascot kladee" alt="" />
    </section>

    <section id="winnerOverlay" class="winner-overlay hidden" role="dialog" aria-modal="true">
      <div class="winner-card">
        <img id="winnerMascot" src="assets/images/malio.webp" alt="Mascot" />
        <p class="kicker">CONGRATULATIONS!</p>
        <h2>YOU ARE A WINNER!</h2>
        <div id="winnerPrize" class="winner-prize">YONO</div>
        <p id="winnerMessage" class="winner-message"></p>
        <div class="winner-actions">
          <button id="awesomeButton" class="primary-btn" type="button">AWESOME</button>
          <button id="retryButton" class="secondary-btn" type="button">RETRY</button>
        </div>
      </div>
    </section>

    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="loading-card"><img src="assets/images/sabahcredit-logo.png" alt=""><strong>Registration Successful</strong><span>Preparing your challenge...</span></div>
    </div>
    <canvas id="fxCanvas" class="fx-canvas"></canvas>
    <div class="tiny-tools" title="Admin tools">
      <button id="musicToggle" type="button" title="Music">♪</button>
      <button id="exportCsv" type="button" title="Export CSV">csv</button>
      <button id="resetData" type="button" title="Reset saved player data">reset</button>
    </div>
    <footer>© 2026 Sabah Credit Corporation. All Rights Reserved.</footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
